<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>uroki-podpiska — wireframes</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Kalam:wght@300;400;700&family=Architects+Daughter&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: 'Kalam', 'Architects Daughter', system-ui, sans-serif; color: #2a251f; }

  /* Wireframe primitives ------------------------------------------------ */
  .wf {
    --ink: #2a251f;
    --ink-2: #5a5048;
    --ink-3: #8a8278;
    --paper: #fdfcf8;
    --line: #2a251f;
    --accent: #3D5A40;
    --hl: #fff3a8;
    color: var(--ink);
    background: var(--paper);
    font-family: 'Kalam', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.4;
    box-sizing: border-box;
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: relative;
  }
  .wf *, .wf *::before, .wf *::after { box-sizing: border-box; }

  /* sketchy hand-drawn borders using layered box-shadows + slightly rotated wobble */
  .wf .box {
    border: 1.5px solid var(--line);
    border-radius: 6px 8px 5px 9px / 7px 5px 9px 6px;
    background: var(--paper);
    position: relative;
  }
  .wf .box.dashed { border-style: dashed; }
  .wf .box.dotted { border-style: dotted; }
  .wf .box.thick { border-width: 2.5px; }
  .wf .box.fill { background: #efece4; }
  .wf .box.fill-2 { background: #e6e2d6; }
  .wf .box.fill-accent { background: #d9e2d8; border-color: #3D5A40; }
  .wf .box.fill-yellow { background: #fff3a8; }

  /* placeholder image: diagonal stripes */
  .wf .ph {
    background:
      repeating-linear-gradient(135deg, transparent 0 8px, rgba(42,37,31,0.18) 8px 9px),
      #f6f3ec;
    border: 1.5px solid var(--line);
    border-radius: 6px 8px 5px 9px / 7px 5px 9px 6px;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-align: center;
    padding: 8px;
  }
  .wf .ph.tight { font-size: 10px; }

  /* squiggly text line */
  .wf .line { height: 8px; background: var(--ink); border-radius: 4px; opacity: 0.85; }
  .wf .line.sm { height: 6px; opacity: 0.7; }
  .wf .line.lg { height: 12px; }
  .wf .line.w90 { width: 90%; } .wf .line.w80 { width: 80%; }
  .wf .line.w70 { width: 70%; } .wf .line.w60 { width: 60%; }
  .wf .line.w50 { width: 50%; } .wf .line.w40 { width: 40%; }
  .wf .line.w30 { width: 30%; } .wf .line.w20 { width: 20%; }
  .wf .line.faint { opacity: 0.35; }

  .wf h1, .wf h2, .wf h3, .wf h4, .wf p { margin: 0; }
  .wf .h1 { font-family: 'Caveat', cursive; font-size: 42px; line-height: 1.05; font-weight: 700; }
  .wf .h2 { font-family: 'Caveat', cursive; font-size: 30px; line-height: 1.1; font-weight: 700; }
  .wf .h3 { font-family: 'Caveat', cursive; font-size: 22px; line-height: 1.15; font-weight: 600; }
  .wf .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-2); }
  .wf .body { font-family: 'Kalam', sans-serif; font-size: 14px; line-height: 1.45; }
  .wf .mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

  .wf .row { display: flex; }
  .wf .col { display: flex; flex-direction: column; }

  .wf .btn {
    display: inline-flex; align-items: center; justify-content: center;
    border: 1.5px solid var(--line);
    background: var(--paper);
    border-radius: 18px 22px 19px 21px / 21px 19px 22px 18px;
    padding: 8px 16px;
    font-family: 'Caveat', cursive;
    font-weight: 600;
    font-size: 18px;
    color: var(--ink);
  }
  .wf .btn.primary { background: var(--accent); color: #f4f1ea; border-color: var(--accent); }
  .wf .btn.ghost { background: transparent; }
  .wf .btn.sm { padding: 5px 11px; font-size: 15px; }

  .wf .chip {
    display: inline-flex; align-items: center;
    border: 1.2px solid var(--line);
    border-radius: 12px 14px 11px 13px;
    padding: 2px 9px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    background: var(--paper);
  }
  .wf .chip.fill { background: #efece4; }
  .wf .chip.accent { background: #d9e2d8; border-color: #3D5A40; }

  /* Annotation note (only shown when annotations on) */
  .wf .note {
    position: absolute;
    font-family: 'Caveat', cursive;
    font-size: 16px;
    color: #b14a2a;
    line-height: 1.15;
    pointer-events: none;
    z-index: 5;
    max-width: 180px;
  }
  .wf .note .arrow {
    display: block;
    color: #b14a2a;
    font-size: 22px;
    line-height: 1;
  }
  body.no-notes .wf .note { display: none; }

  /* nav bar */
  .wf .navbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 32px;
    border-bottom: 1.5px solid var(--line);
  }
  .wf .navbar .logo {
    font-family: 'Caveat', cursive; font-weight: 700; font-size: 22px;
  }
  .wf .navbar nav { display: flex; gap: 22px; font-family: 'Kalam', sans-serif; font-size: 14px; }

  /* footer */
  .wf .footer {
    border-top: 1.5px solid var(--line);
    padding: 24px 32px;
    display: flex; justify-content: space-between;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--ink-2);
  }

  /* scroll inside artboard for tall pages */
  .wf.scroll { overflow-y: auto; }
  .wf.scroll::-webkit-scrollbar { width: 6px; }
  .wf.scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 4px; }

  /* tag for variation badge */
  .var-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    background: #fff3a8;
    border: 1px solid #2a251f;
    padding: 2px 6px;
    border-radius: 4px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

</body>
</html>
