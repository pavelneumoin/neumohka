# Добавляется в /etc/nginx/sites-enabled/rabochiilist
# ПЕРЕД блоком `location /` (который проксирует на rabochiilist:3010).
#
# Делает дизайн-превью Неумошки доступным по http://130.193.35.199/neumoshka/

location /neumoshka/ {
    alias /var/www/neumoshka/;
    # try_files обрабатывает и `/neumoshka/` (без файла) — фоллбэк на index.html.
    # Использовать `index index.html;` НЕ рекомендуется: при alias+try_files
    # nginx возвращает 403 на запрос директории до того, как index срабатывает.
    try_files $uri $uri/index.html =404;

    # Запрет индексации поисковиками (это пока препродакшн)
    add_header X-Robots-Tag "noindex, nofollow" always;
}
