# Добавляется в /etc/nginx/sites-enabled/rabochiilist
# ПЕРЕД блоком `location /` (который проксирует на rabochiilist:3010).
#
# Делает дизайн-превью Неумошки доступным по http://130.193.35.199/neumoshka/

location /neumoshka/ {
    alias /var/www/neumoshka/;
    index wireframes.html;
    try_files $uri $uri/ =404;

    # Запрет индексации поисковиками (это пока препродакшн)
    add_header X-Robots-Tag "noindex, nofollow" always;
}
